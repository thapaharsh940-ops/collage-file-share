<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College File Sharing Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        .section {
            margin-bottom: 50px;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .section h2 {
            color: #667eea;
            margin-bottom: 25px;
            font-size: 1.8em;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        input, select, textarea {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-success:hover {
            background: #218838;
        }
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .file-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s;
        }
        .file-card:hover {
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transform: translateY(-5px);
        }
        .file-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
            word-break: break-word;
        }
        .file-info {
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
        }
        .file-info strong {
            color: #333;
        }
        .download-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .download-btn:hover {
            background: #218838;
        }
        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-weight: 500;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .admin-section {
            background: #fff3cd;
            border: 2px dashed #ffc107;
        }
        .filter-bar {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .init-btn {
            background: #ffc107;
            color: #333;
        }
        .init-btn:hover {
            background: #e0a800;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 College File Sharing Platform</h1>
        <p class="subtitle">Upload, organize, and share educational materials by class and category</p>
        
        <!-- Admin Section -->
        <div class="section admin-section">
            <h2>⚙️ Admin Controls</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Create New Class:</label>
                    <input type="text" id="newClassName" placeholder="e.g., Python Programming">
                </div>
                <div class="form-group">
                    <label>Semester:</label>
                    <input type="text" id="newSemester" placeholder="e.g., Fall 2025">
                </div>
                <div class="form-group">
                    <label>Department:</label>
                    <input type="text" id="newDepartment" placeholder="e.g., Computer Science">
                </div>
                <div class="form-group" style="justify-content: flex-end;">
                    <button class="btn btn-success" onclick="createClass()" style="margin-top: 24px;">Add Class</button>
                </div>
            </div>
            <button class="btn init-btn" onclick="initSampleData()">Initialize Sample Data</button>
        </div>
        
        <!-- Upload Section -->
        <div class="section">
            <h2>⬆️ Upload Files</h2>
            <div id="uploadAlert"></div>
            <form id="uploadForm" enctype="multipart/form-data">
                <div class="form-row">
                    <div class="form-group">
                        <label>Select Class: *</label>
                        <select id="classSelect" required>
                            <option value="">-- Choose Class --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Select Category: *</label>
                        <select id="categorySelect" required>
                            <option value="">-- Choose Category --</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Description:</label>
                    <textarea id="description" rows="3" placeholder="Brief description of the file..."></textarea>
                </div>
                <div class="form-group">
                    <label>Select File: *</label>
                    <input type="file" id="fileInput" required>
                </div>
                <button type="submit" class="btn btn-primary">📤 Upload File</button>
            </form>
        </div>
        
        <!-- Browse Section -->
        <div class="section">
            <h2>📂 Browse Files</h2>
            <div class="filter-bar">
                <div class="form-group" style="flex: 1; min-width: 200px;">
                    <label>Filter by Class:</label>
                    <select id="filterClass">
                        <option value="">All Classes</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1; min-width: 200px;">
                    <label>Filter by Category:</label>
                    <select id="filterCategory">
                        <option value="">All Categories</option>
                    </select>
                </div>
            </div>
            <div id="fileGrid" class="file-grid"></div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:5000/api';
        
        // Load classes on page load
        window.onload = function() {
            loadClasses();
            loadFiles();
        };
        
        // Load classes
        async function loadClasses() {
            const response = await fetch(`${API_URL}/classes`);
            const classes = await response.json();
            
            const classSelect = document.getElementById('classSelect');
            const filterClass = document.getElementById('filterClass');
            
            classSelect.innerHTML = '<option value="">-- Choose Class --</option>';
            filterClass.innerHTML = '<option value="">All Classes</option>';
            
            classes.forEach(cls => {
                classSelect.innerHTML += `<option value="${cls.class_id}">${cls.class_name}</option>`;
                filterClass.innerHTML += `<option value="${cls.class_id}">${cls.class_name}</option>`;
            });
        }
        
        // Load categories when class is selected
        document.getElementById('classSelect').addEventListener('change', async function() {
            const classId = this.value;
            if (!classId) return;
            
            const response = await fetch(`${API_URL}/categories?class_id=${classId}`);
            const categories = await response.json();
            
            const categorySelect = document.getElementById('categorySelect');
            categorySelect.innerHTML = '<option value="">-- Choose Category --</option>';
            
            categories.forEach(cat => {
                categorySelect.innerHTML += `<option value="${cat.category_id}">${cat.category_name}</option>`;
            });
        });
        
        // Load categories for filter
        document.getElementById('filterClass').addEventListener('change', async function() {
            const classId = this.value;
            const filterCategory = document.getElementById('filterCategory');
            
            if (!classId) {
                filterCategory.innerHTML = '<option value="">All Categories</option>';
                loadFiles();
                return;
            }
            
            const response = await fetch(`${API_URL}/categories?class_id=${classId}`);
            const categories = await response.json();
            
            filterCategory.innerHTML = '<option value="">All Categories</option>';
            categories.forEach(cat => {
                filterCategory.innerHTML += `<option value="${cat.category_id}">${cat.category_name}</option>`;
            });
            
            loadFiles(classId);
        });
        
        document.getElementById('filterCategory').addEventListener('change', function() {
            const classId = document.getElementById('filterClass').value;
            const categoryId = this.value;
            loadFiles(classId, categoryId);
        });
        
        // Handle file upload
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('file', document.getElementById('fileInput').files[0]);
            formData.append('class_id', document.getElementById('classSelect').value);
            formData.append('category_id', document.getElementById('categorySelect').value);
            formData.append('description', document.getElementById('description').value);
            
            try {
                const response = await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert('File uploaded successfully!', 'success');
                    this.reset();
                    loadFiles();
                } else {
                    showAlert(result.message, 'error');
                }
            } catch (error) {
                showAlert('Upload failed: ' + error.message, 'error');
            }
        });
        
        // Load and display files
        async function loadFiles(classId = '', categoryId = '') {
            let url = `${API_URL}/files`;
            const params = new URLSearchParams();
            if (classId) params.append('class_id', classId);
            if (categoryId) params.append('category_id', categoryId);
            if (params.toString()) url += '?' + params.toString();
            
            const response = await fetch(url);
            const files = await response.json();
            
            const fileGrid = document.getElementById('fileGrid');
            
            if (files.length === 0) {
                fileGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #666;">No files found. Upload some files to get started!</p>';
                return;
            }
            
            fileGrid.innerHTML = files.map(file => `
                <div class="file-card">
                    <h3>📄 ${file.original_name}</h3>
                    <div class="file-info"><strong>Class:</strong> ${file.class_name}</div>
                    <div class="file-info"><strong>Category:</strong> ${file.category_name}</div>
                    <div class="file-info"><strong>Type:</strong> ${file.file_type.toUpperCase()}</div>
                    <div class="file-info"><strong>Size:</strong> ${formatFileSize(file.file_size)}</div>
                    <div class="file-info"><strong>Downloads:</strong> ${file.downloads}</div>
                    <div class="file-info"><strong>Uploaded:</strong> ${file.upload_date}</div>
                    ${file.description ? `<div class="file-info" style="margin-top: 10px;">${file.description}</div>` : ''}
                    <a href="${API_URL}/download/${file.file_id}" class="download-btn">⬇️ Download</a>
                </div>
            `).join('');
        }
        
        // Create new class
        async function createClass() {
            const className = document.getElementById('newClassName').value;
            const semester = document.getElementById('newSemester').value;
            const department = document.getElementById('newDepartment').value;
            
            if (!className) {
                alert('Please enter a class name');
                return;
            }
            
            const response = await fetch(`${API_URL}/classes`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    class_name: className,
                    semester: semester,
                    department: department
                })
            });
            
            const result = await response.json();
            if (result.success) {
                alert('Class created successfully!');
                document.getElementById('newClassName').value = '';
                document.getElementById('newSemester').value = '';
                document.getElementById('newDepartment').value = '';
                loadClasses();
            }
        }
        
        // Initialize sample data
        async function initSampleData() {
            const response = await fetch(`${API_URL}/init-sample-data`, {
                method: 'POST'
            });
            const result = await response.json();
            alert(result.message);
            loadClasses();
            loadFiles();
        }
        
        // Show alert
        function showAlert(message, type) {
            const alertDiv = document.getElementById('uploadAlert');
            alertDiv.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => alertDiv.innerHTML = '', 5000);
        }
        
        // Format file size
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            else if (bytes < 1048576) return (bytes / 1024).toFixed(2) + ' KB';
            else return (bytes / 1048576).toFixed(2) + ' MB';
        }
    </script>
</body>
</html>
